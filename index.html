<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#177184">
  <meta name="description" content="Офлайн PWA планер Camino del Norte 2026.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Camino 2026">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Camino del Norte 2026 Planner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <style>
    :root {
      --bg: #f7f1e8;
      --card: #fffaf1;
      --white: #fff;
      --text: #17252b;
      --muted: #69777c;
      --ocean: #177184;
      --ocean-dark: #0d5263;
      --sand: #eecb8f;
      --sun: #d98245;
      --green: #397d57;
      --red: #b9584f;
      --line: rgba(23, 37, 43, .12);
      --shadow: 0 12px 34px rgba(21, 52, 61, .12);
      --radius: 18px;
      --tap: 48px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(238, 203, 143, .45), transparent 30rem),
        linear-gradient(180deg, #dff1f0 0%, var(--bg) 34%, var(--bg) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: var(--ocean-dark); font-weight: 800; }

    .app {
      width: min(100%, 960px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 0 14px calc(100px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 0 -14px;
      padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
      background: rgba(247, 241, 232, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1, h2, h3 { margin: 0; letter-spacing: 0; }
    h1 { font-size: clamp(22px, 7vw, 34px); line-height: 1; }
    h2 { font-size: 22px; }
    h3 { font-size: 17px; color: var(--ocean-dark); }
    p { margin: 8px 0 0; }
    .brand p { margin-top: 5px; color: var(--muted); font-size: 14px; }

    .install-btn {
      display: none;
      min-height: var(--tap);
      border: 0;
      border-radius: 999px;
      padding: 0 15px;
      color: #fff;
      background: var(--ocean);
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      margin: 4px 5px 0 0;
      padding: 0 10px;
      border-radius: 999px;
      background: #edf8f7;
      color: var(--ocean-dark);
      font-size: 13px;
      font-weight: 900;
    }
    .chip.sun { background: #fff0df; color: #884b1f; }
    .chip.green { background: #eaf7ef; color: #216040; }
    .chip.red { background: #fff0ef; color: #8f4039; }
    button.chip {
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
    }
    .doc-jump { background: #fff7d7; color: #76520f; }
    .doc-jump[hidden] { display: none; }

    .offline-chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin-top: 12px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 250, 241, .82);
      border: 1px solid var(--line);
      color: var(--ocean-dark);
      font-size: 13px;
      font-weight: 900;
    }

    main { padding-top: 14px; }
    .screen { display: none; }
    .screen.active { display: block; animation: lift .16s ease-out; }
    @keyframes lift { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .hero {
      padding: 18px;
      border-radius: 24px;
      color: #fff;
      background: linear-gradient(135deg, rgba(13, 82, 99, .94), rgba(23, 113, 132, .78)), linear-gradient(45deg, #0d5263, #d98245);
      box-shadow: var(--shadow);
    }
    .hero h2 { font-size: 28px; line-height: 1.06; }
    .hero p { color: rgba(255,255,255,.86); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .stat { min-width: 0; padding: 10px; border-radius: 16px; background: rgba(255,255,255,.16); }
    .stat b { display: block; font-size: 18px; }
    .stat span { display: block; color: rgba(255,255,255,.78); font-size: 12px; }

    .card {
      margin: 12px 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 250, 241, .94);
      box-shadow: var(--shadow);
    }
    .soft {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.66);
    }
    .muted { color: var(--muted); }
    .small { font-size: 13px; }

    .grid { display: grid; gap: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .field label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 11px 12px;
      background: rgba(255,255,255,.86);
      color: var(--text);
      outline-color: var(--ocean);
    }
    textarea { resize: vertical; }
    textarea.notes { min-height: 280px; line-height: 1.55; }

    .btn {
      min-height: var(--tap);
      border: 0;
      border-radius: 15px;
      padding: 0 15px;
      color: #fff;
      background: var(--ocean);
      font-weight: 900;
    }
    .btn.secondary { color: var(--text); background: #eadfce; }
    .btn.danger { color: #fff; background: var(--red); }
    .btn.ghost { color: var(--ocean-dark); background: rgba(23,113,132,.11); }
    .btn.full { width: 100%; }
    .icon-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 14px;
      color: var(--text);
      background: #eadfce;
      font-weight: 900;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    .timeline { display: grid; gap: 12px; }
    .point {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.68);
      transition: box-shadow .25s ease, border-color .25s ease, background .25s ease;
    }
    .point.highlight {
      border-color: #f3b84d;
      background: #fff9e8;
      box-shadow: 0 0 0 4px rgba(243, 184, 77, .22);
    }
    .point.flash {
      outline: 3px solid rgba(217, 130, 69, .65);
      box-shadow: 0 0 0 6px rgba(217, 130, 69, .14), var(--shadow);
      transition: outline-color .2s ease, box-shadow .2s ease;
    }
    .point-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }
    .point-title { font-size: 17px; font-weight: 950; }
    .point-meta { color: var(--muted); font-size: 13px; }
    .point-note { margin-top: 8px; color: var(--muted); }
    .mini-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .attachments { display: grid; gap: 8px; margin-top: 10px; }
    .attachment {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,250,241,.88);
    }
    .thumb {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 12px;
      background: #eadfce;
      display: grid;
      place-items: center;
      color: var(--ocean-dark);
      font-weight: 900;
      font-size: 12px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      padding: 18px 14px calc(18px + env(safe-area-inset-bottom));
      background: rgba(10,24,30,.42);
      overflow: auto;
    }
    .modal.active { display: block; }
    .modal-panel {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 16px;
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .items { display: grid; gap: 8px; margin-top: 12px; }
    .item {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      min-height: 54px;
      gap: 12px;
      padding: 9px 10px;
      border-radius: 15px;
      background: rgba(255,255,255,.66);
      border: 1px solid var(--line);
    }
    input[type="checkbox"] { width: 28px; height: 28px; margin: 0; accent-color: var(--green); }
    .item input:checked + span { color: var(--muted); text-decoration: line-through; }
    .item-tools { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
    .progress { height: 12px; margin: 8px 0 3px; border-radius: 999px; overflow: hidden; background: rgba(23,37,43,.1); }
    .bar { height: 100%; width: 0; border-radius: inherit; background: linear-gradient(90deg, var(--green), var(--ocean)); transition: width .2s ease; }

    .expense-list { display: grid; gap: 8px; margin-top: 12px; }
    .expense {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.68);
    }
    .total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      color: #fff;
      background: var(--ocean-dark);
      font-weight: 900;
    }
    .empty { padding: 16px; border-radius: 16px; background: rgba(255,255,255,.58); color: var(--muted); text-align: center; }

    details { margin: 10px 0; padding: 12px; border: 1px solid var(--line); border-radius: 16px; background: rgba(255,255,255,.62); }
    summary { min-height: 34px; cursor: pointer; font-weight: 900; }
    ul.clean { margin: 8px 0 0; padding-left: 20px; }

    .bottom-nav {
      position: fixed;
      z-index: 20;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: rgba(255,250,241,.94);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .bottom-nav::before,
    .bottom-nav::after {
      content: "";
      position: absolute;
      top: 8px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 1;
      width: 22px;
      pointer-events: none;
    }
    .bottom-nav::before {
      left: 0;
      background: linear-gradient(90deg, rgba(255,250,241,.98), rgba(255,250,241,0));
    }
    .bottom-nav::after {
      right: 0;
      background: linear-gradient(270deg, rgba(255,250,241,.98), rgba(255,250,241,0));
    }
    .nav-scroller {
      display: flex;
      gap: 7px;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 14px 7px;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
      scrollbar-width: thin;
      scrollbar-color: rgba(23,113,132,.55) rgba(23,113,132,.12);
      -webkit-overflow-scrolling: touch;
    }
    .nav-scroller::-webkit-scrollbar { height: 6px; }
    .nav-scroller::-webkit-scrollbar-track {
      border-radius: 999px;
      background: rgba(23,113,132,.12);
    }
    .nav-scroller::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(23,113,132,.55);
    }
    .nav-btn {
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 2px;
      flex: 0 0 82px;
      min-height: 64px;
      border: 0;
      border-radius: 18px;
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      font-weight: 900;
      scroll-snap-align: center;
    }
    .nav-btn .icon { font-size: 17px; line-height: 1; }
    .nav-btn.active { color: #fff; background: var(--ocean); }

    @media (min-width: 720px) {
      .app { padding-left: 22px; padding-right: 22px; }
      .topbar { margin-left: -22px; margin-right: -22px; padding-left: 22px; padding-right: 22px; }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .timeline { grid-template-columns: repeat(2, 1fr); }
      .nav-btn { flex-basis: 92px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-row">
        <div>
          <h1>Camino del Norte 2026</h1>
          <p>Дніпро → Варшава → Більбао → Сантандер → Таріфа → додому</p>
        </div>
        <button id="installBtn" class="install-btn" type="button">Встановити</button>
      </div>
      <div id="offlineStatus" class="offline-chip">Готово до офлайн-роботи</div>
    </header>
    <main id="screens"></main>
  </div>

  <nav class="bottom-nav" aria-label="Основна навігація">
    <div id="nav" class="nav-scroller"></div>
  </nav>

  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <div id="modalContent"></div>
    </div>
  </div>

  <input id="importFile" type="file" accept="application/json,.json" hidden>

  <script>

    const statuses = ["заплановано", "куплено", "підтверджено", "виконано"];
    const bookingTypes = ["квиток", "готель", "страховка", "інше"];

    const defaultRoutePoints = [

      let hash = 0;
      for (let i = 0; i < key.length; i += 1) hash = ((hash << 5) - hash + key.charCodeAt(i)) | 0;
      return `base_route_${index}_${Math.abs(hash).toString(36)}`;

    function normalizeTimelineDateTime(event = {}) {
      const rawDate = String(event.date || "").trim();
      const rawTime = String(event.time || "").trim();
      let date = "";
      let time = "";
      const isoMatch = rawDate.match(/^(\d{4}-\d{2}-\d{2})(?:[T\s](\d{2}:\d{2}))?/);
      if (isoMatch) {
        date = isoMatch[1];
        time = rawTime || isoMatch[2] || "";
      } else {
        date = rawDate.match(/^\d{4}-\d{2}-\d{2}$/) ? rawDate : "";
        time = rawTime;
      }
      const timeMatch = time.match(/^(\d{1,2}):(\d{2})/);
      time = timeMatch ? `${timeMatch[1].padStart(2, "0")}:${timeMatch[2]}` : "";
      const hasDate = /^\d{4}-\d{2}-\d{2}$/.test(date);
      const hasTime = hasDate && Boolean(time);
      const timestamp = hasDate ? Date.parse(`${date}T${hasTime ? time : "23:59"}:00`) : Number.POSITIVE_INFINITY;
      return { date: hasDate ? date : "", time, hasDate, hasTime, timestamp };
    }

    function sortTimelineEvents(events = []) {
      return events
        .map((event, index) => ({ event, index, meta: normalizeTimelineDateTime(event) }))
        .sort((a, b) => {
          if (a.meta.hasDate !== b.meta.hasDate) return a.meta.hasDate ? -1 : 1;
          if (!a.meta.hasDate && !b.meta.hasDate) return timelineFallbackOrder(a.event, a.index) - timelineFallbackOrder(b.event, b.index);
          if (a.meta.date !== b.meta.date) return a.meta.date.localeCompare(b.meta.date);
          if (a.meta.hasTime !== b.meta.hasTime) return a.meta.hasTime ? -1 : 1;
          if (a.meta.hasTime && b.meta.hasTime && a.meta.time !== b.meta.time) return a.meta.time.localeCompare(b.meta.time);
          return timelineFallbackOrder(a.event, a.index) - timelineFallbackOrder(b.event, b.index);
        })
        .map(item => item.event);
    }

    function timelineFallbackOrder(event, index) {
      if (Number.isFinite(Number(event.sortOrder))) return Number(event.sortOrder);
      if (Number.isFinite(Number(event.sort_order))) return Number(event.sort_order);
      const created = Date.parse(event.createdAt || event.created_at || "");
      if (Number.isFinite(created)) return created;
      return index;
    }

    function formatTimelineDay(dateKey) {
      if (!dateKey) return "Без дати";
      return new Date(`${dateKey}T12:00:00`).toLocaleDateString("uk-UA", { day: "numeric", month: "long", year: "numeric" });
    }

    function groupTimelineEvents(events, shouldSort = true) {
      const source = shouldSort ? sortTimelineEvents(events) : events;
      return source.reduce((groups, event) => {
        const meta = normalizeTimelineDateTime(event);
        const key = meta.date || "";
        let group = groups.find(item => item.key === key);
        if (!group) {
          group = { key, title: formatTimelineDay(key), events: [] };
          groups.push(group);
        }
        group.events.push(event);
        return groups;
      }, []);
    }

      if (type.includes("train") || type.includes("поїзд") || type.includes("bus") || type.includes("автобус")) return "transit";
      return "driving";

        .reduce((score, key) => score + (String(point[key] || "").trim() ? 1 : 0), 0);
    }

    function routeUpdatedAt(point = {}) {
      return Date.parse(point.updatedAt || point.updated_at || getLocalUpdated("route_points", point.id) || "") || 0;
    }

    function choosePrimaryRoute(a, b) {
      const scoreDiff = routeFilledScore(b) - routeFilledScore(a);
      if (scoreDiff > 0) return b;
      if (scoreDiff < 0) return a;
      return routeUpdatedAt(b) > routeUpdatedAt(a) ? b : a;
    }

    function smartRouteKey(point = {}) {
      const meta = normalizeTimelineDateTime(point);
      const type = normalizedType(point.type);
      const title = String(point.title || "").trim().toLowerCase();
      const from = String(point.from || "").trim().toLowerCase();
      const to = String(point.to || "").trim().toLowerCase();
      const route = title || `${from}->${to}`;
      if (!meta.date || !type || !route || route === "->") return "";
      return [meta.date, meta.time, type, route].join("|");
    }

    function routeLinkedTickets(id, options = {}) {
      const source = Array.isArray(options.tickets) ? options.tickets : getBookings();
      return source.filter(item => String(item.routePointId || item.related_point_id || "") === String(id));
    }

    function routeLinkedFiles(id, options = {}) {
      const source = Array.isArray(options.ticketFiles) ? options.ticketFiles : getTicketFiles();
      return source.filter(item => String(item.ticketId || item.ticket_id || "") === String(id));
    }

    function canAutoMergeSemanticRoute(a = {}, b = {}, options = {}) {
      if (String(a.id) === String(b.id)) return true;
      const aMeta = normalizeTimelineDateTime(a);
      const bMeta = normalizeTimelineDateTime(b);
      const aNote = cleanText(a.note);
      const bNote = cleanText(b.note);
      if (!aMeta.hasTime && !bMeta.hasTime && aNote && bNote && aNote !== bNote) return false;
      if (routeLinkedFiles(a.id, options).length && routeLinkedFiles(b.id, options).length) return false;
      if (routeLinkedTickets(a.id, options).length && routeLinkedTickets(b.id, options).length) return false;
      return true;
    }

    function remapRouteReferences(idMap) {
      if (!idMap.size) return;
      const bookings = getBookings();
      const nextBookings = bookings.map(item => idMap.has(item.routePointId) ? { ...item, routePointId: idMap.get(item.routePointId) } : item);
      if (JSON.stringify(nextBookings) !== JSON.stringify(bookings)) {
        localStorage.setItem(BOOKINGS_KEY, JSON.stringify(nextBookings));
        touchMany("tickets", nextBookings.map(item => item.id));
      }
      const files = getTicketFiles();
      const nextFiles = files.map(file => idMap.has(file.ticketId) ? { ...file, ticketId: idMap.get(file.ticketId), updatedAt: nowISO() } : file);
      if (JSON.stringify(nextFiles) !== JSON.stringify(files)) saveTicketFiles(nextFiles);
    }

    function remapRouteLinkedRows(rows, idMap, fieldName) {
      if (!idMap.size) return { rows, remapped: 0 };
      let remapped = 0;
      const nextRows = rows.map(row => {
        const currentId = String(row[fieldName] || "");
        if (!idMap.has(currentId)) return row;
        remapped += 1;
        return { ...row, [fieldName]: idMap.get(currentId), updated_at: nowISO() };
      });
      if (remapped) addSyncLog(`${fieldName} remapped to canonical route_point`, `${remapped}`);
      return { rows: nextRows, remapped };
    }

    function dedupeRoutePoints(options = {}) {
      const points = Array.isArray(options.points) ? options.points : getRoutePoints();
      const byId = new Map();
      const bySmartKey = new Map();
      const idMap = new Map();
      const deduped = [];
      let removed = 0;
      points.forEach(point => {
        const id = String(point?.id || "");
        if (!id) {
          deduped.push(point);
          return;
        }
        const smartKey = isSoftDeleted(point) ? "" : smartRouteKey(point);
        const semanticIndex = smartKey && bySmartKey.has(smartKey) ? bySmartKey.get(smartKey) : -1;
        const canMergeSemantic = semanticIndex !== -1 && canAutoMergeSemanticRoute(deduped[semanticIndex], point, options);
        const existingIndex = byId.has(id) ? byId.get(id) : (canMergeSemantic ? semanticIndex : -1);
        if (existingIndex === -1) {
          const index = deduped.length;
          byId.set(id, index);
          if (smartKey) bySmartKey.set(smartKey, index);
          deduped.push(point);
          return;
        }
        const current = deduped[existingIndex];
        const primary = choosePrimaryRoute(current, point);
        const secondary = primary === current ? point : current;
        const merged = mergeRouteDuplicate(primary, secondary);
        deduped[existingIndex] = merged;
        byId.set(String(merged.id), existingIndex);
        byId.set(id, existingIndex);
        if (smartKey) bySmartKey.set(smartKey, existingIndex);
        if (String(secondary.id) !== String(merged.id)) idMap.set(String(secondary.id), String(merged.id));
        removed += 1;
      });
      if (!options.preview && removed > 0) {
        localStorage.setItem(ROUTE_KEY, JSON.stringify(deduped));
        remapRouteReferences(idMap);
        if (options.markDirty) touchMany("route_points", deduped.map(item => item.id));
      }
      if (options.preview && options.applyReferenceMap && idMap.size) remapRouteReferences(idMap);
      if (options.log !== false) addSyncLog("duplicates removed", `${removed}`);
      if (options.refreshView && removed > 0) refresh();
      return { items: deduped, removed, idMap };
    }

    function getBookings(options = {}) {
      const bookings = getAllBookings();
      return options.includeDeleted ? bookings : activeRecords(bookings);
    }
    function saveBookings(items, options = {}) {
      const deleted = options.includeDeleted ? [] : getAllBookings().filter(isSoftDeleted);
      localStorage.setItem(BOOKINGS_KEY, JSON.stringify([...items, ...deleted]));
      if (options.markDirty !== false) touchMany("tickets", items.map(item => item.id));
      refresh();
    }

    function isTicketLikePoint(point) {
      return ticketLikePointTypes.has(String(point.type || "").trim().toLowerCase());
    }

    function getTicketLikePoints(points, bookings) {
      const linkedPointIds = new Set(bookings.map(item => item.routePointId).filter(Boolean));
      return points.filter(point => (isTicketLikePoint(point) || ownerHasCloudFiles(point.id)) && !linkedPointIds.has(point.id));
    }

    function todayISO() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString().slice(0, 10);
    }

    function closestPoint() {
      const points = sortTimelineEvents(getRoutePoints());
      return points.find(item => item.date >= todayISO()) || points[points.length - 1];
    }

    function sortPoints(a, b) {
      const sorted = sortTimelineEvents([a, b]);
      return sorted[0] === a ? -1 : 1;
    }

    function normalizedType(value = "") {
      return String(value).trim().toLowerCase();
    }

    function isTicketLikeType(type = "") {
      const value = normalizedType(type);
      return [
        "flight", "train", "bus", "ferry", "hotel", "booking", "ticket", "transfer",
        "літак", "поїзд", "автобус", "пором", "готель", "бронювання", "квиток", "трансфер"
      ].includes(value);
    }

    function isTicketLikeRoutePoint(pointId) {
      const point = getRoutePoints().find(item => item.id === pointId);
      return Boolean(point && isTicketLikePoint(point));
    }

    function getTimelineTicketPoints(bookings = getBookings()) {
      const linkedPointIds = new Set(bookings.map(item => item.routePointId).filter(Boolean));
      return getRoutePoints()
        .filter(point => isTicketLikePoint(point) || ownerHasCloudFiles(point.id))
        .filter(point => !isEmptyRouteTicketPoint(point))
        .filter(point => !linkedPointIds.has(point.id))
        .sort(sortPoints);
    }

    function getRoutePointTickets(routePointId) {
      return getBookings().filter(item => item.routePointId === routePointId);
    }

    function ownerHasCloudFiles(ownerId) {
      return getTicketFiles().some(file => file.ticketId === ownerId);
    }

    function analyzeTicketFileLinks(files, routePoints, bookings) {
      const routeIds = new Set(routePoints.map(point => String(point.id)));
      const bookingIds = new Set(bookings.map(item => String(item.id)));
      return files.reduce((summary, file) => {
        const ownerId = String(file.ticketId || file.ticket_id || "");
        if (routeIds.has(ownerId)) summary.route += 1;
        else if (bookingIds.has(ownerId)) summary.booking += 1;
        else summary.missing += 1;
        return summary;
      }, { route: 0, booking: 0, missing: 0 });
    }

    function isEmptyBooking(item) {
      return ![
        item.name,
        item.date,
        item.bookingNumber,
        item.note,
        item.routePointId
      ].some(Boolean) && !ownerHasCloudFiles(item.id);
    }

    function isEmptyRouteTicketPoint(item) {
      const hasNameOrRoute = Boolean(item.title || item.from || item.to || item.address);
      const hasDateOrTime = Boolean(item.date || item.time);
      const hasNote = Boolean(item.note);
      return !hasNameOrRoute && !hasDateOrTime && !hasNote && !ownerHasCloudFiles(item.id);
    }

    function initChecklist(card) {
      const list = checklists[card.dataset.checklist];
      let state = getChecklistState(list);
      const boxes = [...card.querySelectorAll('input[type="checkbox"]')];
      boxes.forEach((box, index) => {
        box.addEventListener("change", () => {
          state.items[index].checked = box.checked;
          save();
        });
      });
      card.querySelector(".add-item")?.addEventListener("click", () => {
        const text = prompt("Новий пункт чек-листа");
        if (!text?.trim()) return;
        state.items.push({ id: generateId(), text: text.trim(), checked: false });
        save();
        refresh();
      });
      card.querySelectorAll(".edit-item").forEach((button, index) => button.addEventListener("click", () => {
        const text = prompt("Назва пункту", state.items[index].text);
        if (!text?.trim()) return;
        state.items[index].text = text.trim();
        save();
        refresh();
      }));
      card.querySelectorAll(".delete-item").forEach((button, index) => button.addEventListener("click", () => {
        if (!confirm("Видалити пункт чек-листа?")) return;
        state.items.splice(index, 1);
        save();
        refresh();
      }));
      card.querySelector(".reset")?.addEventListener("click", () => {
        if (confirm("Скинути галочки у цьому розділі?")) {
          state.items.forEach(item => { item.checked = false; });
          save();
          refresh();
        }
      });
      function save() {
        saveChecklistState(list, state);
        update();
      }
      function update() {
        const done = state.items.filter(item => item.checked).length;
        const total = state.items.length;
        const pct = total ? Math.round(done / total * 100) : 0;
        card.querySelector(".bar").style.width = `${pct}%`;
        card.querySelector(".doneText").textContent = `Виконано: ${done} з ${total} (${pct}%)`;
      }
      update();
    }

    function savePoint(id, exists) {
      const points = getRoutePoints();
      const current = points.find(p => p.id === id);
      const updated = {
        id,
        date: val("date"), time: val("time"), type: val("type"), from: val("from"), to: val("to"),
        title: val("title"), address: val("address"), note: val("note"), mapsUrl: val("mapsUrl"), status: val("status"),
        sortOrder: current?.sortOrder ?? current?.sort_order ?? points.length,
        createdAt: current?.createdAt || nowISO()
      };
      const normalized = normalizeRoutePointForSave(updated);
      if (!normalized) {
        alert("Заповніть хоча б назву, маршрут або примітку точки маршруту.");
        return;
      }
      const next = exists ? points.map(p => p.id === id ? normalized : p) : [...points, normalized];
      saveRoutePoints(next);
      closeModal();
    }

    function movePoint(id, delta) {
      const points = getRoutePoints();
      const index = points.findIndex(p => p.id === id);
      const nextIndex = index + delta;
      if (index < 0 || nextIndex < 0 || nextIndex >= points.length) return;
      [points[index], points[nextIndex]] = [points[nextIndex], points[index]];
      saveRoutePoints(points.map((point, sortOrder) => ({ ...point, sortOrder })));
    }

    function copyPoint(id) {
      const points = getRoutePoints();
      const item = points.find(p => p.id === id);
      if (!item) return;
      const copy = { ...item, id: generateId(), title: `${item.title || item.from + " → " + item.to} (копія)`, createdAt: nowISO() };
      points.splice(points.findIndex(p => p.id === id) + 1, 0, copy);
      saveRoutePoints(points.map((point, sortOrder) => ({ ...point, sortOrder })));
    }

    function field(label, id, type, value = "") {

    function selectField(label, id, options, value) {

    function val(id) { return document.getElementById(id)?.value.trim() || ""; }
    function openModal() { modal.classList.add("active"); }
    function closeModal() { modal.classList.remove("active"); modalContent.innerHTML = ""; }

    function openFileForm(store, ownerId, withKind) {
      modalContent.innerHTML = `
        <h2>Додати PDF / фото / QR</h2>
        <div class="form-grid">
          ${withKind ? selectField("Тип файлу", "fileKind", attachmentKinds, "квиток") : ""}
          <div class="field"><label for="fileInput">Файл / зображення / PDF</label><input id="fileInput" type="file" accept="image/*,.pdf"></div>
        </div>
        <div class="actions"><button class="btn" type="button" onclick="saveFile('${store}', '${ownerId}')">Зберегти файл</button><button class="btn secondary" type="button" onclick="closeModal()">Скасувати</button></div>
      `;
      openModal();
    }

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("camino2026_db", 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains("attachments")) db.createObjectStore("attachments", { keyPath: "id" });
          if (!db.objectStoreNames.contains("routeAttachments")) db.createObjectStore("routeAttachments", { keyPath: "id" });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function dbAll(storeName) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readonly");
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function dbPut(storeName, value) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).put(value);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dbDelete(storeName, id) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).delete(id);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function dbClear(storeName) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).clear();
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function saveFile(storeName, ownerId) {
      const input = document.getElementById("fileInput");
      const file = input.files?.[0];
      if (!file) { alert("Оберіть файл."); return; }
      const id = generateId();
      const kind = document.getElementById("fileKind")?.value || "";
      const existingLocal = (await dbAll(storeName)).find(item =>
        item.ownerId === ownerId &&
        item.filename === file.name &&
        Number(item.sizeBytes || item.blob?.size || 0) === Number(file.size || 0) &&
        item.mimeType === (file.type || "application/octet-stream")
      );
      if (existingLocal) {
        closeModal();
        await renderAllAttachments();
        addSyncLog("файл уже існує", file.name);
        return;
      }
      const uploadOptions = { id, kind };
      const uploaded = await trySaveTicketFileToSupabase(ownerId, file, uploadOptions);
      if (uploaded) {
        if (uploadOptions.duplicateId) {
          closeModal();
          await renderAllAttachments();
          return;
        }
        await dbPut(storeName, {
          id,
          ownerId,
          cloudId: id,
          kind,
          blob: file,
          filename: file.name,
          mimeType: file.type || "application/octet-stream",
          sizeBytes: file.size || 0,
          createdAt: new Date().toISOString()
        });
        closeModal();
        await renderAllAttachments();
        return;
      }
      await dbPut(storeName, {
        id,
        ownerId,
        kind,
        blob: file,
        filename: file.name,
        mimeType: file.type || "application/octet-stream",
        sizeBytes: file.size || 0,
        createdAt: new Date().toISOString()
      });
      if (storeName === "attachments" || (storeName === "routeAttachments" && isTicketLikeRoutePoint(ownerId))) {
        setSyncStatus("Файл збережено локально. Для синхронізації підключіть Supabase.");
        addSyncLog("локальний файл", file.name);
      } else {
        setSyncStatus("Файл збережено локально");
        addSyncLog("локальний файл", file.name);
      }
      scheduleAutosync();
      closeModal();
      renderAllAttachments();
    }

    function safePathPart(value) {
      return String(value || "file").normalize("NFKD").replace(/[^\w.-]+/g, "_").replace(/^_+|_+$/g, "").slice(0, 80) || "file";
    }

    async function trySaveTicketFileToSupabase(ticketId, file, options = {}) {
      const setup = options.client && options.tripCode ? { client: options.client, tripCode: options.tripCode } : getOptionalSupabaseClient();
      if (!setup || !navigator.onLine) return false;
      try {
        const mimeType = file.type || "application/octet-stream";
        const duplicate = getTicketFiles().find(item =>
          item.ticketId === ticketId &&
          item.filename === file.name &&
          item.mimeType === mimeType &&
          Number(item.sizeBytes || 0) === Number(file.size || 0) &&
          item.storagePath
        );
        if (duplicate) {
          options.duplicateId = duplicate.id;
          setSyncStatus(syncedNowLabel());
          addSyncLog("файл уже є у Storage", file.name);
          return true;
        }
        setSyncStatus("Синхронізація…");
        const { client } = setup;
        const tripCode = normalizeTripCode(setup.tripCode);
        await upsertTrip(client, tripCode);
        const id = options.id || generateId();
        const storagePath = `${safePathPart(tripCode)}/tickets/${safePathPart(ticketId)}/${id}_${safePathPart(file.name)}`;
        const { error: uploadError } = await client.storage.from("camino-files").upload(storagePath, file, {
          cacheControl: "3600",
          contentType: mimeType,
          upsert: true
        });
        if (uploadError) throw uploadError;
        const row = {
          id,
          trip_code: normalizeTripCode(tripCode),
          ticket_id: ticketId,
          filename: file.name,
          mime_type: mimeType,
          storage_path: storagePath,
          size_bytes: file.size || 0,
          created_at: nowISO(),
          updated_at: nowISO()
        };
        await cloudUpsert(client, "ticket_files", [row]);
        saveTicketFiles([rowToTicketFile(row), ...getTicketFiles().filter(item => item.id !== id)], { markDirty: false });
        setSyncStatus(syncedNowLabel());
        addSyncLog("завантажено файл", file.name);
        return true;
      } catch (error) {
        setSyncStatus("Помилка синхронізації");
        addSyncLog("помилка файлу", error.message);
        if (!options.silent) alert(`Не вдалося завантажити файл у Supabase. Файл буде збережено локально. ${error.message}`);
        return false;
      }
    }

    async function renderAllAttachments() {
      await refreshTicketFileSignedUrls();
      const routeFiles = await dbAll("routeAttachments");
      renderRouteDocumentBadges(routeFiles);
      await renderFiles("routeAttachments", "[data-route-files]", routeFiles);
      await renderFiles("attachments", "[data-booking-files]");
    }

    function renderRouteDocumentBadges(routeFiles) {
      const cloudRouteIds = new Set(getTicketFiles()
        .filter(file => getRoutePoints().some(point => point.id === file.ticketId))
        .map(file => file.id));
      const counts = routeFiles.reduce((map, file) => {
        if (file.cloudId && cloudRouteIds.has(file.cloudId)) return map;
        map.set(file.ownerId, (map.get(file.ownerId) || 0) + 1);
        return map;
      }, new Map());
      getTicketFiles().forEach(file => {
        if (!getRoutePoints().some(point => point.id === file.ticketId)) return;
        counts.set(file.ticketId, (counts.get(file.ticketId) || 0) + 1);
      });
      document.querySelectorAll("[data-route-file-jump]").forEach(button => {
        const count = counts.get(button.dataset.routeFileJump) || 0;
        button.hidden = count === 0;
        if (count > 0) {
          button.textContent = `📎 ${count}`;
          button.setAttribute("aria-label", `Відкрити документи: ${count}`);
        }
      });
    }

    async function refreshTicketFileSignedUrls() {
      const setup = getOptionalSupabaseClient();
      if (!setup) return;
      const files = getTicketFiles();
      const needsRefresh = files.filter(file =>
        String(file.mimeType || "").startsWith("image/") &&
        (!file.signedUrl || new Date(file.signedUrlExpiresAt || 0).getTime() < Date.now() + 60000)
      );
      if (!needsRefresh.length) return;
      const refreshed = new Map();
      for (const file of needsRefresh) {
        const { data, error } = await setup.client.storage.from("camino-files").createSignedUrl(file.storagePath, 60 * 60);
        if (!error) refreshed.set(file.id, { ...file, signedUrl: data.signedUrl, signedUrlExpiresAt: new Date(Date.now() + 55 * 60 * 1000).toISOString() });
      }
      if (refreshed.size) saveTicketFiles(files.map(file => refreshed.get(file.id) || file), { markDirty: false });
    }

    async function renderFiles(storeName, selector, providedFiles = null) {
      const containers = [...document.querySelectorAll(selector)];
      if (!containers.length) return;
      const files = providedFiles || await dbAll(storeName);
      const cloudTicketFiles = getTicketFiles();
      containers.forEach(container => {
        const ownerId = container.dataset.routeFiles || container.dataset.bookingFiles;
        const cloudOwn = cloudTicketFiles.filter(file => file.ticketId === ownerId);
        const cloudIds = new Set(cloudOwn.map(file => file.id));
        const localOwn = files.filter(file => file.ownerId === ownerId && !cloudIds.has(file.cloudId));
        container.innerHTML = [
          ...cloudOwn.map(file => cloudFileView(file)),
          ...localOwn.map(file => fileView(storeName, file))
        ].join("");
      });
    }

    function cloudFileView(file) {
      const isImage = String(file.mimeType || "").startsWith("image/");
      const preview = isImage && file.signedUrl
        ? `<img class="thumb" src="${escapeHtml(file.signedUrl)}" alt="${escapeHtml(file.filename)}">`
        : `<div class="thumb">${String(file.mimeType || "").includes("pdf") ? "PDF" : "FILE"}</div>`;
      return `
        <div class="attachment">
          ${preview}
          <div>
            <strong>${escapeHtml(file.filename)}</strong>
            <div class="small muted">Supabase Storage · ${escapeHtml(file.mimeType || "file")} · ${Number(file.sizeBytes || 0)} bytes</div>
            <div class="actions">
              <button class="btn ghost" type="button" onclick="openCloudFile('${file.id}')">Відкрити</button>
              <button class="btn ghost" type="button" onclick="downloadCloudFile('${file.id}')">Завантажити</button>
              <button class="btn danger" type="button" onclick="deleteCloudFile('${file.id}')">Видалити</button>
            </div>
          </div>
        </div>
      `;
    }

    function fileView(storeName, file) {
      const url = URL.createObjectURL(file.blob);
      const isImage = file.mimeType.startsWith("image/");
      return `
        <div class="attachment">
          ${isImage ? `<img class="thumb" src="${url}" alt="${escapeHtml(file.filename)}">` : `<div class="thumb">PDF</div>`}
          <div>
            <strong>${escapeHtml(file.kind ? file.kind + ": " : "")}${escapeHtml(file.filename)}</strong>
            <div class="small muted">${escapeHtml(file.mimeType)} · ${new Date(file.createdAt).toLocaleDateString("uk-UA")}</div>
            <div class="actions">
              <a class="btn ghost" href="${url}" target="_blank" rel="noopener">Відкрити</a>
              <button class="btn danger" type="button" onclick="deleteFile('${storeName}', '${file.id}')">Видалити файл</button>
            </div>
          </div>
        </div>
      `;
    }

    async function deleteFile(storeName, id) {
      await dbDelete(storeName, id);
      renderAllAttachments();
    }

    async function openCloudFile(id) {
      const file = await ensureSignedTicketFile(id);
      if (file?.signedUrl) {
        await cacheCloudFile(file);
        window.open(file.signedUrl, "_blank", "noopener");
      }
    }

    async function downloadCloudFile(id) {
      const file = await ensureSignedTicketFile(id);
      if (!file?.signedUrl) {
        const cached = await getCachedCloudFile(id);
        if (cached?.blob) {
          const cachedUrl = URL.createObjectURL(cached.blob);
          const cachedLink = document.createElement("a");
          cachedLink.href = cachedUrl;
          cachedLink.download = cached.filename || "camino-file";
          document.body.appendChild(cachedLink);
          cachedLink.click();
          cachedLink.remove();
        }
        return;
      }
      await cacheCloudFile(file);
      const link = document.createElement("a");
      link.href = file.signedUrl;
      link.download = file.filename || "camino-file";
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    async function ensureSignedTicketFile(id) {
      const files = getTicketFiles();
      let file = files.find(item => item.id === id);
      if (!file) return null;
      if (file.signedUrl && new Date(file.signedUrlExpiresAt || 0).getTime() > Date.now() + 60000) return file;
      const setup = getOptionalSupabaseClient();
      if (!setup) {
        const cached = await getCachedCloudFile(id);
        if (cached?.blob) return { ...file, signedUrl: URL.createObjectURL(cached.blob) };
        alert("Підключіть Supabase, щоб відкрити файл з хмари.");
        return file;
      }
      const { data, error } = await setup.client.storage.from("camino-files").createSignedUrl(file.storagePath, 60 * 60);
      if (error) {
        setSyncStatus("Помилка синхронізації");
        addSyncLog("помилка signed url", error.message);
        alert(error.message);
        return file;
      }
      file = { ...file, signedUrl: data.signedUrl, signedUrlExpiresAt: new Date(Date.now() + 55 * 60 * 1000).toISOString() };
      saveTicketFiles(files.map(item => item.id === id ? file : item), { markDirty: false });
      renderAllAttachments();
      return file;
    }

    function ownerStoreForTicketFile(file) {
      return getRoutePoints().some(point => point.id === file.ticketId) ? "routeAttachments" : "attachments";
    }

    async function getCachedCloudFile(id) {
      const stores = ["routeAttachments", "attachments"];
      for (const storeName of stores) {
        const files = await dbAll(storeName);
        const file = files.find(item => item.cloudId === id || item.id === `cloud_${id}`);
        if (file) return file;
      }
      return null;
    }

    async function cacheCloudFile(file) {
      if (!file?.signedUrl) return;
      try {
        const response = await fetch(file.signedUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const blob = await response.blob();
        await dbPut(ownerStoreForTicketFile(file), {
          id: `cloud_${file.id}`,
          ownerId: file.ticketId,
          cloudId: file.id,
          kind: "Supabase",
          blob,
          filename: file.filename,
          mimeType: file.mimeType || blob.type || "application/octet-stream",
          createdAt: file.createdAt || nowISO()
        });
        addSyncLog("файл кешовано офлайн", file.filename);
      } catch (error) {
        addSyncLog("помилка кешу файлу", error.message);
      }
    }

    async function deleteCloudFile(id, options = {}) {
      if (!options.skipConfirm && !confirm("Видалити файл з Supabase Storage?")) return;
      const files = getAllTicketFiles();
      const file = files.find(item => item.id === id);
      if (!file) return;
      try {
        const deletedAt = nowISO();
        saveTicketFiles(files.map(item => String(item.id) === String(id) ? { ...item, deletedAt, updatedAt: deletedAt } : item));
        setSyncStatus("Є локальні зміни");
        addSyncLog("видалено файл", file.filename);
      } catch (error) {
        setSyncStatus("Помилка синхронізації");
        addSyncLog("помилка видалення файлу", error.message);
      }
      renderAllAttachments();
    }

    async function deleteFilesByOwner(storeName, ownerId, options = {}) {
      const files = await dbAll(storeName);
      await Promise.all(files.filter(file => file.ownerId === ownerId).map(file => dbDelete(storeName, file.id)));
      if (storeName === "attachments" || storeName === "routeAttachments") {
        const cloudFiles = getAllTicketFiles().filter(file => file.ticketId === ownerId && !isSoftDeleted(file));
        for (const file of cloudFiles) await deleteCloudFile(file.id, { skipConfirm: options.skipConfirm !== false });
      }
      renderAllAttachments();
    }

    function saveExpenses(expenses, options = {}) {

    function initImport() {
      document.getElementById("importFile").addEventListener("change", event => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(reader.result);
            if (Array.isArray(data.routePoints)) {
              const importedRoutes = data.routePoints.map(item => normalizeRoutePointForSave(item)).filter(Boolean);
              const routeDedupe = dedupeRoutePoints({ points: importedRoutes, preview: true, applyReferenceMap: true });
              localStorage.setItem(ROUTE_KEY, JSON.stringify(sortTimelineEvents(routeDedupe.items)));
              addSyncLog("import route_points", `${importedRoutes.length} received, ${routeDedupe.removed} duplicates removed`);
            }
            if (Array.isArray(data.bookings)) localStorage.setItem(BOOKINGS_KEY, JSON.stringify(data.bookings));
            if (Array.isArray(data.expenses)) localStorage.setItem("camino2026_expenses", JSON.stringify(data.expenses));
            if (typeof data.notes === "string") localStorage.setItem("camino2026_notes", data.notes);
            if (data.checklists) Object.entries(data.checklists).forEach(([key, value]) => localStorage.setItem(key, JSON.stringify(value)));
            alert("Імпорт завершено. Файли не імпортуються з JSON.");
            refresh();
          } catch {
            alert("Не вдалося прочитати JSON.");
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      });
    }

    function readSyncForm() {
      const rawTripCode = document.getElementById("syncTripCode")?.value.trim() || CANONICAL_TRIP_CODE;
      const tripCode = normalizeTripCode(rawTripCode);
      if (rawTripCode !== tripCode) {
        const input = document.getElementById("syncTripCode");
        if (input) input.value = tripCode;
        addSyncLog("trip_code normalized", `${rawTripCode} → ${tripCode}`);
      }
      return {
        url: document.getElementById("syncUrl")?.value.trim() || "",
        anonKey: document.getElementById("syncAnonKey")?.value.trim() || "",
        tripCode
      };
    }

    function saveSyncConfig(config) {
      localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify({ ...config, tripCode: normalizeTripCode(config.tripCode) }));
    }

    function initSyncSettings() {
      const fields = ["syncUrl", "syncAnonKey", "syncTripCode"].map(id => document.getElementById(id)).filter(Boolean);
      fields.forEach(field => {
        field.addEventListener("input", () => {
          saveSyncConfig(readSyncForm());
        });
      });
      const autosync = document.getElementById("syncAutosync");
      const syncOnOpen = document.getElementById("syncOnOpen");
      const interval = document.getElementById("syncInterval");
      const saveSettings = () => saveSyncSettings({
        autosync: Boolean(autosync?.checked),
        syncOnOpen: Boolean(syncOnOpen?.checked),
        intervalMinutes: Number(interval?.value || 5)
      });
      autosync?.addEventListener("change", saveSettings);
      syncOnOpen?.addEventListener("change", saveSettings);
      interval?.addEventListener("change", saveSettings);
    }

    function getSupabaseClient() {
      const config = readSyncForm();
      saveSyncConfig(config);
      if (!config.url || !config.anonKey || !config.tripCode) {
        throw new Error("Заповніть Supabase URL, anon key і код подорожі.");
      }
      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        throw new Error("Supabase CDN ще не завантажився або немає інтернету.");
      }
      return { client: window.supabase.createClient(config.url, config.anonKey), tripCode: config.tripCode };
    }

      } catch (error) {
        setSyncStatus(`Помилка підключення: ${error.message}`);

    function shortJSON(value) {

    }

    function rowPreview(row) {
      const preview = {
        id: row.id || row.list_key || row.trip_code || "",
        trip_code: row.trip_code || "",
        ticket_id: row.ticket_id || "",
        related_point_id: row.related_point_id || "",
        type: row.type || "",

    async function readDiagnosticTable(client, table, tripCode) {
      try {
        const { data, error } = await client.from(table).select("*").eq("trip_code", tripCode);
        if (error) throw error;
        const rows = data || [];
        const latest = rows.slice().sort((a, b) => String(b.updated_at || b.created_at || "").localeCompare(String(a.updated_at || a.created_at || ""))).slice(0, 5);
        return { table, ok: true, count: rows.length, latest, error: "" };
      } catch (error) {
        return { table, ok: false, count: 0, latest: [], error: error.message };
      }
    }

    async function runSupabaseDiagnostics() {
      setSyncDiagnostics(`<div class="soft">Діагностика виконується...</div>`);
      try {
        const config = readSyncForm();
        saveSyncConfig(config);
        const { client, tripCode } = getSupabaseClient();
        let tripStatus = "не перевірено";
        try {
          await upsertTrip(client, tripCode);
          const { data, error } = await client.from("trips").select("*").eq("code", tripCode).maybeSingle();
          if (error) throw error;
          tripStatus = data ? "створено/знайдено" : "не знайдено після upsert";
        } catch (error) {
          tripStatus = `помилка trips: ${error.message}`;
        }

        const tables = await Promise.all([
          readDiagnosticTable(client, "route_points", tripCode),
          readDiagnosticTable(client, "tickets", tripCode),
          readDiagnosticTable(client, "ticket_files", tripCode)
        ]);
        const schema = await auditSupabaseSchema(client, ["route_points", "tickets", "ticket_files"]);
        const byName = Object.fromEntries(tables.map(item => [item.table, item]));
        const lastTripCode = localStorage.getItem(SYNC_LAST_TRIP_KEY) || "";
        const tripWarning = lastTripCode && lastTripCode !== tripCode
          ? `<div class="soft small red"><strong>Попередження trip_code:</strong> останній synced trip_code <code>${escapeHtml(lastTripCode)}</code>, поточний <code>${escapeHtml(tripCode)}</code>.</div>`
          : "";

        setSyncDiagnostics(`
          <div class="soft small"><strong>Supabase URL:</strong> ${escapeHtml(config.url || "(порожньо)")}</div>
          <div class="soft small"><strong>trip_code:</strong> <code>${escapeHtml(tripCode)}</code></div>
          ${tripWarning}
          <div class="soft small"><strong>trip:</strong> ${escapeHtml(tripStatus)}</div>
          <div class="soft small"><strong>Локально:</strong> route_points ${getRoutePoints().length}, tickets ${getBookings().length}, ticket_files ${getTicketFiles().length}</div>
          <div class="soft small"><strong>Supabase:</strong> route_points ${byName.route_points.count}, tickets ${byName.tickets.count}, ticket_files ${byName.ticket_files.count}</div>
          ${tables.map(result => `
            <details ${result.ok ? "" : "open"}>
              <summary>${escapeHtml(result.table)}: ${result.ok ? `${result.count} записів` : "помилка"}</summary>
              ${result.error ? `<div class="soft small red">${escapeHtml(result.error)}</div>` : ""}
              <pre class="soft small">${shortJSON(result.latest.map(rowPreview))}</pre>
            </details>
          `).join("")}
          <details open>
            <summary>Фактична схема / columns audit</summary>
            <pre class="soft small">${shortJSON(schema)}</pre>
          </details>

    function routeIntegrityReport(rows, tickets = [], files = [], tripCode = CANONICAL_TRIP_CODE) {
      const byId = new Map();
      const duplicateIds = [];
      const semantic = new Map();
      const semanticDuplicates = [];
      const possibleManualReview = [];
      const emptyRows = [];
      const testRows = [];
      const wrongTripRows = [];
      rows.forEach(row => {
        const id = String(row.id || "");
        if (byId.has(id)) duplicateIds.push(id);
        byId.set(id, row);
        if (!cleanText(row.title) && !cleanText(row.from_place) && !cleanText(row.to_place) && !cleanText(row.note)) emptyRows.push(id);
        if (/sync_test|SYNC_TEST/i.test([row.id, row.title, row.from_place, row.to_place, row.note].join(" "))) testRows.push(id);
        if (normalizeTripCode(row.trip_code) !== normalizeTripCode(tripCode) || row.trip_code !== normalizeTripCode(tripCode)) wrongTripRows.push({ id, trip_code: row.trip_code });
        const key = [
          normalizeTripCode(row.trip_code),
          cleanText(row.date),
          cleanText(row.time),
          cleanText(row.type).toLowerCase(),
          cleanText(row.title).toLowerCase(),
          cleanText(row.from_place).toLowerCase(),
          cleanText(row.to_place).toLowerCase()
        ].join("|");
        if (!semantic.has(key)) {
          semantic.set(key, [row]);
          return;
        }
        const group = semantic.get(key);
        const first = group[0];
        const firstFiles = files.filter(file => String(file.ticket_id || "") === String(first.id));
        const rowFiles = files.filter(file => String(file.ticket_id || "") === String(row.id));
        const firstTickets = tickets.filter(ticket => String(ticket.related_point_id || "") === String(first.id));
        const rowTickets = tickets.filter(ticket => String(ticket.related_point_id || "") === String(row.id));
        if (!cleanText(row.time) && cleanText(first.note) && cleanText(row.note) && cleanText(first.note) !== cleanText(row.note)) {
          possibleManualReview.push({ ids: [first.id, row.id], reason: "same key without time but different notes" });
        } else if (firstFiles.length && rowFiles.length) {
          possibleManualReview.push({ ids: [first.id, row.id], reason: "both have files" });
        } else if (firstTickets.length && rowTickets.length) {
          possibleManualReview.push({ ids: [first.id, row.id], reason: "both have linked tickets" });
        } else {
          semanticDuplicates.push([first.id, row.id]);
        }
        group.push(row);
      });
      return { duplicateIds, semanticDuplicates, possibleManualReview, emptyRows, testRows, wrongTripRows };
    }

    async function listTripStoragePaths(client, tripCode) {
      const root = `${safePathPart(normalizeTripCode(tripCode))}/tickets`;
      const paths = [];
      const errors = [];
      try {
        const { data: owners, error } = await client.storage.from("camino-files").list(root, { limit: 1000 });
        if (error) throw error;
        for (const owner of owners || []) {
          const ownerPath = `${root}/${owner.name}`;
          const { data: files, error: fileError } = await client.storage.from("camino-files").list(ownerPath, { limit: 1000 });
          if (fileError) {
            errors.push(`${ownerPath}: ${fileError.message}`);
            continue;
          }
          (files || []).forEach(file => paths.push(`${ownerPath}/${file.name}`));
        }
      } catch (error) {
        errors.push(error.message);
      }
      return { paths, errors };
    }

    async function checkOrphanIntegrity() {
      setSyncDiagnostics(`<div class="soft">Перевірка orphan-зв'язків...</div>`);
      try {
        const { client, tripCode } = getSupabaseClient();
        const [routes, tickets, files, storage] = await Promise.all([
          cloudSelect(client, "route_points", tripCode),
          cloudSelect(client, "tickets", tripCode),
          cloudSelect(client, "ticket_files", tripCode),
          listTripStoragePaths(client, tripCode)
        ]);
        const activeRoutes = routes.filter(row => !row.deleted_at);
        const deletedRouteIds = new Set(routes.filter(row => row.deleted_at).map(row => String(row.id)));
        const activeTickets = tickets.filter(row => !row.deleted_at);
        const activeFiles = files.filter(row => !row.deleted_at);
        const routeIds = new Set(activeRoutes.map(row => String(row.id)));
        const ticketIds = new Set(activeTickets.map(row => String(row.id)));
        const metadataPaths = new Set(activeFiles.map(row => String(row.storage_path || "")).filter(Boolean));
        const storagePaths = new Set(storage.paths);
        const orphanTickets = activeTickets.filter(row => row.related_point_id && !routeIds.has(String(row.related_point_id)));

        const metadataWithoutStorage = activeFiles.filter(row => row.storage_path && !storagePaths.has(String(row.storage_path)));
        const storageWithoutMetadata = storage.paths.filter(path => !metadataPaths.has(path));
        const report = {
          orphanTickets: orphanTickets.map(rowPreview),
          orphanFiles: orphanFiles.map(rowPreview),
          ticketsForDeletedRoutes: ticketsForDeletedRoutes.map(rowPreview),
          filesForDeletedRoutes: filesForDeletedRoutes.map(rowPreview),

          <div class="soft small">metadata без Storage файла: ${metadataWithoutStorage.length}</div>
          <div class="soft small">Storage файли без metadata: ${storageWithoutMetadata.length}</div>
          ${storage.errors.length ? `<div class="soft small red">Storage scan errors: ${escapeHtml(storage.errors.join("; "))}</div>` : ""}
          <details open><summary>Details</summary><pre class="soft small">${shortJSON(report)}</pre></details>
        `);

      } catch (error) {
        setSyncDiagnostics(`<div class="soft small red">${escapeHtml(error.message)}</div>`);

    }

    async function auditSupabaseSchema(client, tables) {
      const result = {};
      for (const table of tables) {
        result[table] = { selectStarColumns: [], informationSchemaColumns: [], errors: [] };
        try {
          const { data, error } = await client.from(table).select("*").limit(1);
          if (error) throw error;
          result[table].selectStarColumns = Object.keys(data?.[0] || {});
        } catch (error) {
          result[table].errors.push(`select *: ${error.message}`);
        }
        try {
          const schemaClient = typeof client.schema === "function" ? client.schema("information_schema") : client;
          const { data, error } = await schemaClient
            .from("columns")
            .select("table_name,column_name,data_type,is_nullable")
            .eq("table_schema", "public")
            .eq("table_name", table)
            .order("ordinal_position", { ascending: true });
          if (error) throw error;
          result[table].informationSchemaColumns = data || [];
        } catch (error) {
          result[table].errors.push(`information_schema.columns: ${error.message}`);
        }
      }
      return result;
    }

    async function upsertRoutePointsToSupabase(client, tripCode, points, options = {}) {
      const normalizedTripCode = normalizeTripCode(tripCode);
      const input = Array.isArray(points) ? points : [];
      addSyncLog("route_points local before upload", `${input.length}`);
      const localDedupe = dedupeRoutePoints({ points: input, preview: true, applyReferenceMap: true, log: false });
      const uniqueById = new Map();
      let emptySkipped = 0;
      localDedupe.items.forEach((item, index) => {
        const row = routeToRow(item, index, normalizedTripCode);
        if (!row) {
          emptySkipped += 1;
          return;
        }
        uniqueById.set(String(row.id), row);
      });
      const rows = [...uniqueById.values()];
      const duplicatesPrevented = Math.max(0, input.length - rows.length - emptySkipped);
      addSyncLog("route_points payload unique", `${rows.length}`);
      addSyncLog("duplicates prevented", `${duplicatesPrevented}`);
      addSyncLog("empty route_points skipped", `${emptySkipped}`);
      if (!rows.length) return { before: 0, after: 0, inserted: 0, updated: 0, skipped: emptySkipped, duplicatesPrevented };

      const beforeRows = await countCloudRoutePoints(client, normalizedTripCode);
      const beforeIds = new Set(beforeRows.map(row => String(row.id)));
      addSyncLog("cloud route_points before", `${beforeRows.length}`);
      const inserted = rows.filter(row => !beforeIds.has(String(row.id))).length;
      const updated = rows.length - inserted;
      await cloudUpsert(client, "route_points", rows, "id");
      const afterRows = await countCloudRoutePoints(client, normalizedTripCode);
      addSyncLog("cloud route_points after", `${afterRows.length}`);
      addSyncLog("route_points inserted/updated", `${inserted}/${updated}`);
      if (localDedupe.removed) addSyncLog("duplicates removed", `${localDedupe.removed}`);
      if (options.persistLocal) {
        saveRoutePoints(sortTimelineEvents(localDedupe.items.map(item => normalizeRoutePointForSave(item)).filter(Boolean)), { markDirty: false });
      }
      return { before: beforeRows.length, after: afterRows.length, inserted, updated, skipped: emptySkipped, duplicatesPrevented };
    }

      for (const storeName of ["routeAttachments", "attachments"]) {

          if (file.cloudId || !file.blob) continue;
          const uploaded = await trySaveTicketFileToSupabase(file.ownerId, file.blob, {
            id: file.id,
            kind: file.kind || "",
            client,

            silent: true
          });

            await dbPut(storeName, { ...file, cloudId: file.id });
            uploadedCount += 1;
          }
        }
      }
      if (uploadedCount) addSyncLog("завантажено локальні файли", `${uploadedCount}`);
      return uploadedCount;
    }
