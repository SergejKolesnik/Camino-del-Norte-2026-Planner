        const ticketRows = getBookings({ includeDeleted: true }).map(item => ticketToRow(item, tripCode));
        const fileRows = getTicketFiles({ includeDeleted: true }).map(item => ticketFileToRow(item, tripCode));
        const routeStats = await upsertRoutePointsToSupabase(client, tripCode, sortedRoutes);
        await cloudUpsert(client, "tickets", ticketRows);
        await cloudUpsert(client, "ticket_files", fileRows);
        await cloudUpsert(client, "expenses", getExpenses({ includeDeleted: true }).map(item => expenseToRow(item, tripCode)));
        await uploadNotes(client, tripCode);
        await uploadChecklists(client, tripCode);
        localStorage.setItem(SYNC_LAST_TRIP_KEY, tripCode);
        setSyncStatus(syncedNowLabel());
        addSyncLog("синхронізовано", "локальні дані завантажено в хмару");
        addSyncLog("uploaded route_points", `${routeStats.inserted + routeStats.updated}`);
        addSyncLog("uploaded tickets", `${ticketRows.length}`);
        addSyncLog("uploaded ticket_files", `${fileRows.length}`);
        addSyncLog("storage uploaded files", `${storageUploaded}`);
      } catch (error) {
        setSyncStatus(`Помилка синхронізації: ${error.message}`);
        addSyncLog("errors", error.message);
      }
    }

    async function pullCloudToLocal() {
      try {
        setSyncStatus("Синхронізація…");
        const { client, tripCode } = getSupabaseClient();
        await syncDeletedRoutePointsToCloud(client, tripCode);
        const [cloudRoutesRaw, tickets, ticketFiles, expenses] = await Promise.all([
          cloudSelect(client, "route_points", tripCode),
          cloudSelect(client, "tickets", tripCode),
          cloudSelect(client, "ticket_files", tripCode),
          cloudSelect(client, "expenses", tripCode)
        ]);
        const routes = filterDeletedRouteRows(cloudRoutesRaw);
        const routeBase = routeMergeBase(routes);
        const routeMerge = mergeCloudRows(routeBase, routes.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0)), rowToRoute);
        const routeDedupe = dedupeRoutePoints({ points: routeMerge.items, preview: true, applyReferenceMap: true, tickets: [...getBookings({ includeDeleted: true }), ...tickets], ticketFiles: [...getTicketFiles({ includeDeleted: true }), ...ticketFiles] });
        const remappedTickets = remapRouteLinkedRows(tickets, routeDedupe.idMap, "related_point_id");
        const remappedTicketFiles = remapRouteLinkedRows(ticketFiles, routeDedupe.idMap, "ticket_id");
        const sortedRoutes = sortTimelineEvents(routeDedupe.items);
        const ticketMerge = mergeCloudRows(getBookings({ includeDeleted: true }), remappedTickets.rows, rowToTicket);
        const expenseMerge = mergeCloudRows(getExpenses({ includeDeleted: true }), expenses, rowToExpense);
        const fileMerge = mergeCloudRows(getTicketFiles({ includeDeleted: true }), remappedTicketFiles.rows, rowToTicketFile);
        localStorage.setItem(ROUTE_KEY, JSON.stringify(sortedRoutes));
        localStorage.setItem(BOOKINGS_KEY, JSON.stringify(ticketMerge.items));
        saveTicketFiles(await hydrateAndCacheTicketFiles(client, fileMerge.items), { markDirty: false });
        localStorage.setItem("camino2026_expenses", JSON.stringify(expenseMerge.items));
        await pullNotes(client, tripCode);
        await pullChecklists(client, tripCode);
        localStorage.setItem(SYNC_LAST_TRIP_KEY, tripCode);
        setSyncStatus(syncedNowLabel());
        addSyncLog("прочитано маршрут", `${routes.length} точок`);
        addSyncLog("синхронізовано", "хмарні дані підтягнуто локально");
        addSyncLog("cloud route_points received", `${routes.length}`);
        addSyncLog("cloud tickets received", `${tickets.length}`);
        addSyncLog("cloud ticket_files received", `${ticketFiles.length}`);
        addSyncLog("local route_points after merge", `${sortedRoutes.length}`);
        addSyncLog("local tickets after merge", `${ticketMerge.items.length}`);
        addSyncLog("local file metadata after merge", `${fileMerge.items.length}`);
        addSyncLog("downloaded route_points", `${routes.length} (${routeMerge.added} added, ${routeMerge.updated} updated)`);
        addSyncLog("downloaded tickets", `${tickets.length} (${ticketMerge.added} added, ${ticketMerge.updated} updated)`);
        addSyncLog("downloaded ticket_files", `${ticketFiles.length} (${fileMerge.added} added, ${fileMerge.updated} updated)`);
        refresh();
        logRenderedTicketCards();
      } catch (error) {
        setSyncStatus(`Помилка синхронізації: ${error.message}`);
        addSyncLog("errors", error.message);
      }
    }

    function mergeCloudRows(localItems, cloudRows, rowToLocal) {
      const local = [...localItems];
      let added = 0;
      let updated = 0;
      cloudRows.forEach(row => {
        const incoming = rowToLocal(row);
        const index = local.findIndex(item => String(item.id) === String(incoming.id));
        if (index === -1) {
          local.push(incoming);
          added += 1;
        } else {
          local[index] = { ...local[index], ...incoming };
          updated += 1;
        }
      });
      return { items: local, added, updated };
    }

    function renderedTicketCardCount() {
      return document.querySelectorAll("#screen-bookings article.point").length;
    }

    function logRenderedTicketCards() {
      addSyncLog("rendered ticket cards", `${renderedTicketCardCount()}`);
    }

    async function clearLocalAndRestoreFromSupabase() {
      if (!confirm("Очистити локальні дані цього браузера і відновити їх із Supabase для поточного trip_code?")) return;
      try {
        setSyncStatus("очищення локальних даних...");
        [
          ROUTE_KEY,
          BOOKINGS_KEY,
          TICKET_FILES_KEY,
          DELETED_ROUTE_POINTS_KEY,
          "camino2026_expenses",
          "camino2026_notes",
          "camino2026_serhii",
          "camino2026_oksana",
          "camino2026_vitaha",
          "camino2026_shared",
          "camino2026_med"
        ].forEach(key => localStorage.removeItem(key));
        await Promise.all([dbClear("routeAttachments"), dbClear("attachments")]);
        addSyncLog("local cleared", "route_points, tickets, ticket_files, checklists, notes, expenses, IndexedDB files");
        await forceDownloadFromSupabase({ replaceLocal: true });
      } catch (error) {
        setSyncStatus(`помилка очищення: ${error.message}`);
        addSyncLog("errors", error.message);
      }
    }

    async function forceDownloadFromSupabase(options = {}) {
      try {
        setSyncStatus("примусове завантаження...");
        const { client, tripCode } = getSupabaseClient();
        await upsertTrip(client, tripCode);
        await syncDeletedRoutePointsToCloud(client, tripCode);
        const [cloudRoutesRaw, tickets, ticketFiles, expenses, checklistsRows, notesResult] = await Promise.all([
          cloudSelect(client, "route_points", tripCode),
          cloudSelect(client, "tickets", tripCode),
          cloudSelect(client, "ticket_files", tripCode),
          cloudSelect(client, "expenses", tripCode),
          cloudSelect(client, "checklists", tripCode),
          client.from("notes").select("*").eq("trip_code", normalizeTripCode(tripCode)).maybeSingle()
        ]);
        const routes = filterDeletedRouteRows(cloudRoutesRaw);
        if (notesResult.error) throw new Error(`notes: ${notesResult.error.message}`);
        const routeBase = routeMergeBase(routes, options);
        const ticketBase = options.replaceLocal ? [] : getBookings({ includeDeleted: true });
        const fileBase = options.replaceLocal ? [] : getTicketFiles({ includeDeleted: true });
        const expenseBase = options.replaceLocal ? [] : getExpenses({ includeDeleted: true });
        const routeMerge = mergeCloudRows(routeBase, routes.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0)), rowToRoute);
        const routeDedupe = dedupeRoutePoints({ points: routeMerge.items, preview: true, applyReferenceMap: true, tickets: [...ticketBase, ...tickets], ticketFiles: [...fileBase, ...ticketFiles] });
        const remappedTickets = remapRouteLinkedRows(tickets, routeDedupe.idMap, "related_point_id");
        const remappedTicketFiles = remapRouteLinkedRows(ticketFiles, routeDedupe.idMap, "ticket_id");
        const sortedRoutes = sortTimelineEvents(routeDedupe.items);
        const ticketMerge = mergeCloudRows(ticketBase, remappedTickets.rows, rowToTicket);
        const fileMerge = mergeCloudRows(fileBase, remappedTicketFiles.rows, rowToTicketFile);
        const expenseMerge = mergeCloudRows(expenseBase, expenses, rowToExpense);
        const fileLinks = analyzeTicketFileLinks(fileMerge.items, sortedRoutes, ticketMerge.items);
        localStorage.setItem(ROUTE_KEY, JSON.stringify(sortedRoutes));
        localStorage.setItem(BOOKINGS_KEY, JSON.stringify(ticketMerge.items));
        saveTicketFiles(await hydrateAndCacheTicketFiles(client, fileMerge.items), { markDirty: false });
        localStorage.setItem("camino2026_expenses", JSON.stringify(expenseMerge.items));
        checklistsRows.forEach(row => {
          localStorage.setItem(row.list_key, JSON.stringify(row.state || []));
          setLocalUpdated("checklists", row.list_key, row.updated_at || nowISO());
        });
        if (notesResult.data) {
          localStorage.setItem("camino2026_notes", notesResult.data.content || "");
          setLocalUpdated("notes", "", notesResult.data.updated_at || nowISO());
        }
        localStorage.setItem(SYNC_LAST_TRIP_KEY, tripCode);
        setSyncStatus("примусове завантаження завершено");
        addSyncLog("cloud route_points received", `${routes.length}`);
        addSyncLog("cloud tickets received", `${tickets.length}`);
        addSyncLog("cloud ticket_files received", `${ticketFiles.length}`);
        addSyncLog("local route_points after merge", `${sortedRoutes.length}`);
        addSyncLog("local tickets after merge", `${ticketMerge.items.length}`);
        addSyncLog("local file metadata after merge", `${fileMerge.items.length}`);
        addSyncLog("downloaded route_points", `${routes.length} (${routeMerge.added} added, ${routeMerge.updated} updated)`);
        addSyncLog("downloaded tickets", `${tickets.length} (${ticketMerge.added} added, ${ticketMerge.updated} updated)`);
        addSyncLog("downloaded ticket_files", `${ticketFiles.length} (${fileMerge.added} added, ${fileMerge.updated} updated)`);
        addSyncLog("downloaded checklists", `${checklistsRows.length}`);
        addSyncLog("downloaded expenses", `${expenses.length} (${expenseMerge.added} added, ${expenseMerge.updated} updated)`);
        const reportHtml = `
          <div class="soft small"><strong>Force Download OK:</strong></div>
          <div class="soft small">route_points: ${routes.length} (${routeMerge.added} added, ${routeMerge.updated} updated, ${routeDedupe.removed} duplicates removed)</div>
          <div class="soft small">tickets: ${tickets.length} (${ticketMerge.added} added, ${ticketMerge.updated} updated)</div>
          <div class="soft small">ticket_files: ${ticketFiles.length} (${fileMerge.added} added, ${fileMerge.updated} updated)</div>
          <div class="soft small">remapped tickets: ${remappedTickets.remapped}, remapped ticket_files: ${remappedTicketFiles.remapped}</div>
          <div class="soft small">file links: route_points ${fileLinks.route}, bookings ${fileLinks.booking}, missing ${fileLinks.missing}</div>
          <div class="soft small">checklists: ${checklistsRows.length}, notes: ${notesResult.data ? 1 : 0}, expenses: ${expenses.length}</div>
        `;
        refresh();
        setSyncDiagnostics(reportHtml);
        logRenderedTicketCards();
      } catch (error) {
        setSyncStatus(`Помилка синхронізації: ${error.message}`);
        setSyncDiagnostics(`<div class="soft small red">${escapeHtml(error.message)}</div>`);
        addSyncLog("errors", error.message);
      }
    }

    function isCloudNewer(localUpdated, cloudUpdated) {
      return new Date(cloudUpdated || "1970-01-01T00:00:00.000Z").getTime() > new Date(localUpdated || "1970-01-01T00:00:00.000Z").getTime();
    }

    async function syncNow(options = {}) {
      if (isSyncing) {
        pendingSync = true;
        return;
      }
      isSyncing = true;
      try {
        setSyncStatus("Синхронізація…");
        const { client, tripCode } = getSupabaseClient();
        await upsertTrip(client, tripCode);
        await syncDeletedRoutePointsToCloud(client, tripCode);
        const storageUploaded = await uploadLocalFilesToCloud(client, tripCode);

        const [cloudRoutesRaw, cloudTickets, cloudTicketFiles] = await Promise.all([
          cloudSelect(client, "route_points", tripCode),
          cloudSelect(client, "tickets", tripCode),
          cloudSelect(client, "ticket_files", tripCode)
        ]);
        const cloudRoutes = filterDeletedRouteRows(cloudRoutesRaw);
        const localRouteDedupe = dedupeRoutePoints({ points: routeMergeBase(cloudRoutes), preview: true, log: false, applyReferenceMap: true, tickets: [...getBookings({ includeDeleted: true }), ...cloudTickets], ticketFiles: [...getTicketFiles({ includeDeleted: true }), ...cloudTicketFiles] });
        const localRoutes = localRouteDedupe.items;
        const routeResult = mergeByUpdatedAt(localRoutes, cloudRoutes, "route_points", rowToRoute, (item, index) => routeToRow(item, index, tripCode));
        const routeDedupe = dedupeRoutePoints({ points: routeResult.local, preview: true, applyReferenceMap: true, tickets: [...getBookings({ includeDeleted: true }), ...cloudTickets], ticketFiles: [...getTicketFiles({ includeDeleted: true }), ...cloudTicketFiles] });
        const remappedCloudTickets = remapRouteLinkedRows(cloudTickets, routeDedupe.idMap, "related_point_id");
        const remappedCloudTicketFiles = remapRouteLinkedRows(cloudTicketFiles, routeDedupe.idMap, "ticket_id");
        const sortedRoutes = sortTimelineEvents(routeDedupe.items);
        localStorage.setItem(ROUTE_KEY, JSON.stringify(sortedRoutes));
        const routeUpload = await upsertRoutePointsToSupabase(client, tripCode, routeResult.pushRows.map(rowToRoute));
        addSyncLog("uploaded route_points", `${routeUpload.inserted + routeUpload.updated}`);
        addSyncLog("downloaded route_points", `${cloudRoutes.length}`);

        const ticketResult = mergeByUpdatedAt(getBookings({ includeDeleted: true }), remappedCloudTickets.rows, "tickets", rowToTicket, item => ticketToRow(item, tripCode));
        localStorage.setItem(BOOKINGS_KEY, JSON.stringify(ticketResult.local));
        await cloudUpsert(client, "tickets", ticketResult.pushRows);
        addSyncLog("uploaded tickets", `${ticketResult.pushRows.length}`);
        addSyncLog("downloaded tickets", `${cloudTickets.length}`);

        const localTicketFiles = getTicketFiles({ includeDeleted: true });
        const localFileMap = new Map(localTicketFiles.map(file => [String(file.id), file]));
        const cloudFileMap = new Map(remappedCloudTicketFiles.rows.map(file => [String(file.id), rowToTicketFile(file)]));
        const mergedFiles = [...localTicketFiles];
        cloudFileMap.forEach((file, id) => {
          const localFile = localFileMap.get(id);
          if (!localFile) {
            mergedFiles.push(file);
            return;
          }
          if (isCloudNewer(localFile.updatedAt, file.updatedAt)) {
            const index = mergedFiles.findIndex(item => String(item.id) === id);
            mergedFiles[index] = file;
          }
        });
        const localFileRows = localTicketFiles
          .filter(file => file.storagePath)
          .filter(file => {
            const cloudFile = cloudFileMap.get(String(file.id));
            return !cloudFile || !isCloudNewer(file.updatedAt, cloudFile.updatedAt);
          })
          .map(file => ticketFileToRow(file, tripCode));
        const remappedCloudFileRows = remappedCloudTicketFiles.remapped
          ? remappedCloudTicketFiles.rows.filter((row, index) => String(row.ticket_id || "") !== String(cloudTicketFiles[index]?.ticket_id || ""))
          : [];
        await cloudUpsert(client, "ticket_files", [...localFileRows, ...remappedCloudFileRows]);
        if (remappedCloudFileRows.length) addSyncLog("uploaded remapped ticket_files", `${remappedCloudFileRows.length}`);
        saveTicketFiles(await hydrateAndCacheTicketFiles(client, mergedFiles), { markDirty: false });
        addSyncLog("uploaded ticket_files", `${localFileRows.length}`);
        addSyncLog("downloaded ticket_files", `${cloudTicketFiles.length}`);
        addSyncLog("storage uploaded files", `${storageUploaded}`);

        const cloudExpenses = await cloudSelect(client, "expenses", tripCode);
        const expenseResult = mergeByUpdatedAt(getExpenses({ includeDeleted: true }), cloudExpenses, "expenses", rowToExpense, item => expenseToRow(item, tripCode));
        localStorage.setItem("camino2026_expenses", JSON.stringify(expenseResult.local));
        await cloudUpsert(client, "expenses", expenseResult.pushRows);

        await syncNotes(client, tripCode);
        await syncChecklists(client, tripCode);
        localStorage.setItem(SYNC_LAST_TRIP_KEY, tripCode);
        setSyncStatus(syncedNowLabel());
        addSyncLog("local route_points after merge", `${sortedRoutes.length}`);
        addSyncLog("local tickets after merge", `${ticketResult.local.length}`);
        addSyncLog("local file metadata after merge", `${mergedFiles.length}`);
        addSyncLog(options.silent ? "autosync" : "синхронізовано", "lastUpdated wins");
        refresh();
        logRenderedTicketCards();
      } catch (error) {
        setSyncStatus("Помилка синхронізації");
        addSyncLog("errors", error.message);
        if (options.silent) throw error;
      } finally {
        isSyncing = false;
        if (pendingSync) {
          pendingSync = false;
          setTimeout(() => syncNow({ silent: true }), 0);
        }
      }
    }

    function mergeByUpdatedAt(localItems, cloudRows, scope, rowToLocal, localToRow) {
      const localMap = new Map(localItems.map(item => [String(item.id), item]));
      const cloudMap = new Map(cloudRows.map(row => [String(row.id), row]));
      const local = [...localItems];
      const pushRows = [];

      localItems.forEach((item, index) => {
        const cloud = cloudMap.get(String(item.id));
        const localUpdated = getLocalUpdated(scope, String(item.id));
        if (!cloud || !isCloudNewer(localUpdated, cloud.updated_at)) {
          const row = localToRow(item, index);
          if (row) pushRows.push(row);
        }
      });

      cloudRows.forEach(row => {
        const localItem = localMap.get(String(row.id));
        if (!localItem) {
          local.push(rowToLocal(row));
          return;
        }
        if (isCloudNewer(getLocalUpdated(scope, String(row.id)), row.updated_at)) {
          const index = local.findIndex(item => String(item.id) === String(row.id));
          local[index] = rowToLocal(row);
        }
      });

      return { local, pushRows };
    }

    async function uploadNotes(client, tripCode) {
      const updated_at = getLocalUpdated("notes") === "1970-01-01T00:00:00.000Z" ? nowISO() : getLocalUpdated("notes");
      setLocalUpdated("notes", "", updated_at);
      const { error } = await client.from("notes").upsert({ trip_code: normalizeTripCode(tripCode), content: localStorage.getItem("camino2026_notes") || "", updated_at }, { onConflict: "trip_code" });
      if (error) throw error;
    }

    async function pullNotes(client, tripCode) {
      const { data, error } = await client.from("notes").select("*").eq("trip_code", normalizeTripCode(tripCode)).maybeSingle();
      if (error) throw error;
      if (data) {
        localStorage.setItem("camino2026_notes", data.content || "");
        setLocalUpdated("notes", "", data.updated_at || nowISO());
      }
    }

    async function syncNotes(client, tripCode) {
      const { data, error } = await client.from("notes").select("*").eq("trip_code", normalizeTripCode(tripCode)).maybeSingle();
      if (error) throw error;
      const localUpdated = getLocalUpdated("notes");
      if (data && isCloudNewer(localUpdated, data.updated_at)) {
        localStorage.setItem("camino2026_notes", data.content || "");
        setLocalUpdated("notes", "", data.updated_at || nowISO());
      } else {
        await uploadNotes(client, tripCode);
      }
    }

    function checklistRows(tripCode) {
      return Object.values(checklists).map(list => {
        const updated_at = getLocalUpdated("checklists", list.storage) === "1970-01-01T00:00:00.000Z" ? nowISO() : getLocalUpdated("checklists", list.storage);
        setLocalUpdated("checklists", list.storage, updated_at);
        return { trip_code: normalizeTripCode(tripCode), list_key: list.storage, state: getChecklistState(list), updated_at };
      });
    }

    async function uploadChecklists(client, tripCode) {
      await cloudUpsert(client, "checklists", checklistRows(tripCode), "trip_code,list_key");
      addSyncLog("синхронізовано чек-листи", "upload");
    }

    async function pullChecklists(client, tripCode) {
      const rows = await cloudSelect(client, "checklists", tripCode);
      rows.forEach(row => {
        localStorage.setItem(row.list_key, JSON.stringify(row.state || []));
        setLocalUpdated("checklists", row.list_key, row.updated_at || nowISO());
      });
      addSyncLog("синхронізовано чек-листи", `pull ${rows.length}`);
    }

    async function syncChecklists(client, tripCode) {
      const cloudRows = await cloudSelect(client, "checklists", tripCode);
      const pushRows = [];
      checklistRows(tripCode).forEach(localRow => {
        const cloud = cloudRows.find(row => row.list_key === localRow.list_key);
        if (cloud && isCloudNewer(getLocalUpdated("checklists", localRow.list_key), cloud.updated_at)) {
          localStorage.setItem(cloud.list_key, JSON.stringify(cloud.state || []));
          setLocalUpdated("checklists", cloud.list_key, cloud.updated_at || nowISO());
        } else {
          pushRows.push(localRow);
        }
      });
      await cloudUpsert(client, "checklists", pushRows, "trip_code,list_key");
      addSyncLog("синхронізовано чек-листи", `sync ${pushRows.length} upload`);
    }

    function updateNetworkStatus() {
      const chip = document.getElementById("offlineStatus");
      const savedStatus = localStorage.getItem(SYNC_STATUS_KEY);
      chip.textContent = savedStatus || (navigator.onLine ? "Локально" : "Офлайн-режим активний");
    }

    function initPWA() {
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");
      let deferredPrompt;
      const installBtn = document.getElementById("installBtn");
      window.addEventListener("beforeinstallprompt", event => {
        event.preventDefault();
        deferredPrompt = event;
        installBtn.style.display = "inline-flex";
      });
      installBtn.addEventListener("click", async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.style.display = "none";
      });
      window.addEventListener("online", updateNetworkStatus);
      window.addEventListener("offline", updateNetworkStatus);
    }

    init();
  </script>
